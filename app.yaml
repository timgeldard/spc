# Databricks Apps configuration
# Note: auth_type and requested_scopes are configured via the App Settings UI (User authorization)
command:
  - uvicorn
  - backend.main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: DATABRICKS_WAREHOUSE_HTTP_PATH
    value: "${var.warehouse_http_path}"

  - name: TRACE_CATALOG
    value: "${var.trace_catalog}"

  - name: TRACE_SCHEMA
    value: "${var.trace_schema}"
