# Databricks Apps configuration
# Note: auth_type and requested_scopes are configured via the App Settings UI (User authorization)
command:
  - uvicorn
  - backend.main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: DATABRICKS_WAREHOUSE_HTTP_PATH
    value: "$DATABRICKS_WAREHOUSE_HTTP_PATH"

  - name: TRACE_CATALOG
    value: "$TRACE_CATALOG"

  - name: TRACE_SCHEMA
    value: "$TRACE_SCHEMA"
