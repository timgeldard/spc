name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: pytest backend/tests -v

      - name: Install Databricks CLI
        if: ${{ secrets.DATABRICKS_HOST != '' && secrets.DATABRICKS_TOKEN != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base
          pip install databricks-cli

      - name: Configure Databricks CLI for migration checks
        if: ${{ secrets.DATABRICKS_HOST != '' && secrets.DATABRICKS_TOKEN != '' }}
        run: |
          mkdir -p "$HOME"
          cat > "$HOME/.databrickscfg" <<EOF
          [ci]
          host = ${{ secrets.DATABRICKS_HOST }}
          token = ${{ secrets.DATABRICKS_TOKEN }}
          EOF

      - name: Apply locked-limits migration
        if: ${{ secrets.DATABRICKS_HOST != '' && secrets.DATABRICKS_TOKEN != '' }}
        env:
          TRACE_CATALOG: ${{ vars.TRACE_CATALOG || 'connected_plant_uat' }}
          TRACE_SCHEMA: ${{ vars.TRACE_SCHEMA || 'gold' }}
        run: make setup-locked-limits PROFILE=ci

      - name: Apply query-audit migration
        if: ${{ secrets.DATABRICKS_HOST != '' && secrets.DATABRICKS_TOKEN != '' }}
        env:
          TRACE_CATALOG: ${{ vars.TRACE_CATALOG || 'connected_plant_uat' }}
          TRACE_SCHEMA: ${{ vars.TRACE_SCHEMA || 'gold' }}
        run: make setup-query-audit PROFILE=ci
